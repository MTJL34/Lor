services:
  - type: web
    name: lor-poc
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    numInstances: 1
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JSON_DB_PATH
        value: /var/data/database.json
